<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chaplin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-gray-50">
    
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="{% url 'core:index' %}" class="text-2xl font-bold text-orange-500">Chaplin</a>
                <a href="{% url 'core:index' %}" class="text-gray-700 hover:text-orange-500">Voltar</a>
            </div>
        </div>
    </nav>

    
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-md">
            
            <div class="bg-white rounded-lg shadow-md p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-gray-900">Chaplin</h1>
                    <p class="text-gray-600 mt-2">Faça login na sua conta</p>
                </div>

                
                <form method="POST" action="{% url 'users:login' %}" class="space-y-6">
                    {% csrf_token %}

                    
                    {% if error %}
                    <div class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
                        <svg class="w-5 h-5 shrink-0 mt-0.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span>{{ error }}</span>
                    </div>
                    {% endif %}

                    
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                            Email ou Usuário
                        </label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="usuário ou email"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                            required
                        >
                    </div>

                    
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            Senha
                        </label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                            required
                        >
                    </div>

                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="rounded border-gray-300 text-orange-500">
                            <span class="ml-2 text-sm text-gray-600">Lembrar-me</span>
                        </label>
                        <a href="#" class="text-sm text-orange-500 hover:text-orange-600">Esqueceu a senha?</a>
                    </div>

                    
                    <button
                        type="submit"
                        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2 px-4 rounded-lg transition"
                    >
                        Fazer Login
                    </button>
                </form>

                
                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Não tem uma conta?
                        <a href="{% url 'users:register' %}" class="text-orange-500 hover:text-orange-600 font-semibold">Cadastre-se</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
