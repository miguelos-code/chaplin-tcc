{% extends "base.html" %}

{% block title %}Perfil - Chaplin{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-3xl font-bold mb-6">Meu Perfil</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome</label>
                <p class="mt-1 text-lg">{{ user.get_full_name }}</p>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Usuário</label>
                <p class="mt-1 text-lg">{{ user.username }}</p>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <p class="mt-1 text-lg">{{ user.email }}</p>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Função</label>
                <p class="mt-1 text-lg">{{ profile.get_role_display }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
