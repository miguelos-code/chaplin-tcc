<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaplin - TCC</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FFFFFF;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            font-family: 'Roboto', sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        .left-section {
            background: #FFFFFF;
            padding-top: 120px;
            padding-left: 80px;
            padding-right: 60px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-right: 8px solid #000000;
            position: relative;
            z-index: 2;
        }
        
        .right-section {
            background: linear-gradient(135deg, #FF3D00 0%, #2962FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .title {
            font-size: 64px;
            font-weight: 700;
            color: #000000;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            font-size: 32px;
            font-weight: 400;
            color: #1F1F1F;
            margin-bottom: 60px;
            line-height: 1.3;
        }
        
        .divider {
            width: 100px;
            height: 8px;
            background: #FF3D00;
            margin-bottom: 40px;
        }
        
        .info-section {
            font-size: 16px;
            color: #1F1F1F;
            line-height: 2;
        }
        
        .info-label {
            font-weight: 700;
            color: #000000;
            display: inline-block;
            width: 120px;
        }
        
        .info-value {
            color: #1F1F1F;
        }
        
        .geometric-shape {
            position: absolute;
            opacity: 0.1;
        }
        
        .circle {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: #000000;
            top: -100px;
            right: -100px;
        }
        
        .square {
            width: 300px;
            height: 300px;
            background: #000000;
            bottom: -50px;
            left: -50px;
        }
        
        .icon-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        
        .icon-text {
            font-size: 120px;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="left-section">
            <h1 class="title">Chaplin</h1>
            <p class="subtitle">Marketplace de Serviços de Manutenção</p>
            
            <div class="divider"></div>
            
            <div class="info-section">
                <div><span class="info-label">Trabalho:</span> <span class="info-value">Conclusão de Curso (TCC)</span></div>
                <div><span class="info-label">Autor:</span> <span class="info-value">[Seu Nome]</span></div>
                <div><span class="info-label">Instituição:</span> <span class="info-value">[Sua Instituição]</span></div>
                <div><span class="info-label">Curso:</span> <span class="info-value">[Seu Curso]</span></div>
                <div><span class="info-label">Data:</span> <span class="info-value">[Data da Apresentação]</span></div>
            </div>
        </div>
        
        <div class="right-section">
            <div class="geometric-shape circle"></div>
            <div class="geometric-shape square"></div>
            <div class="icon-container">
                <div class="icon-text">🔧</div>
            </div>
        </div>
    </div>
</body>
</html>
