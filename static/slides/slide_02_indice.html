<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FFFFFF;
            padding-top: 80px;
            padding-left: 80px;
            padding-right: 80px;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            margin-bottom: 50px;
        }
        
        .title {
            font-size: 48px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 20px;
        }
        
        .divider {
            width: 120px;
            height: 8px;
            background: #FF3D00;
            margin-bottom: 40px;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            flex: 1;
        }
        
        .column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        
        .item-number {
            font-size: 28px;
            font-weight: 700;
            color: #FF3D00;
            min-width: 40px;
            line-height: 1.4;
        }
        
        .item-text {
            font-size: 18px;
            font-weight: 400;
            color: #1F1F1F;
            line-height: 1.4;
            padding-top: 4px;
        }
        
        .item-border {
            height: 2px;
            background: #000000;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1 class="title">Índice</h1>
            <div class="divider"></div>
        </div>
        
        <div class="content">
            <div class="column">
                <div class="item">
                    <div class="item-number">1</div>
                    <div class="item-text">Problemática e Contexto</div>
                </div>
                <div class="item-border"></div>
                
                <div class="item">
                    <div class="item-number">2</div>
                    <div class="item-text">Justificativa do Projeto</div>
                </div>
                <div class="item-border"></div>
                
                <div class="item">
                    <div class="item-number">3</div>
                    <div class="item-text">Diagramas de Caso de Uso</div>
                </div>
                <div class="item-border"></div>
                
                <div class="item">
                    <div class="item-number">4</div>
                    <div class="item-text">Fluxogramas do Sistema</div>
                </div>
                <div class="item-border"></div>
                
                <div class="item">
                    <div class="item-number">5</div>
                    <div class="item-text">Requisitos Funcionais</div>
                </div>
            </div>
            
            <div class="column">
                <div class="item">
                    <div class="item-number">6</div>
                    <div class="item-text">Requisitos Não-Funcionais</div>
                </div>
                <div class="item-border"></div>
                
                <div class="item">
                    <div class="item-number">7</div>
                    <div class="item-text">Arquitetura Técnica</div>
                </div>
                <div class="item-border"></div>
                
                <div class="item">
                    <div class="item-number">8</div>
                    <div class="item-text">Cronograma de Desenvolvimento</div>
                </div>
                <div class="item-border"></div>
                
                <div class="item">
                    <div class="item-number">9</div>
                    <div class="item-text">Conclusão e Próximos Passos</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
